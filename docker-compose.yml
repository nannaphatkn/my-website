services:
  db:
    image: postgres:16-alpine
    container_name: concert-ticket-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-ticket_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticket_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: concert-ticket-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-ticketing}
      DB_USER: ${POSTGRES_USER:-ticket_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ticket_password}
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/public/posters:/app/posters
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: concert-ticket-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public/posters:/app/public/posters
    depends_on:
      - backend

volumes:
  postgres_data:
